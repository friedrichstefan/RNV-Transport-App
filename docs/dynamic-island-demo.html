<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Island Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --di-w: 88px;
      --di-h: 27px;
    }

    body {
      background: #161616;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Page ───────────────────────────────────── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* ── Phone container ───────────────────────── */
    .phone-container {
      position: relative;
      width: 320px;
      height: 654px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .screen-bg {
      position: absolute;
      top: 2.4%;
      left: 5.33%;
      width: 89.33%;
      height: 94.5%;
      background: #161616;
      background-image: url("screenshots/Simulator Screenshot - iPhone 17 Pro - 2026-05-12 at 22.54.34.jpeg");
      background-size: cover;
      background-position: center top;
      border-radius: 20px 20px 46px 46px;
      z-index: 1;
    }

    .phone-frame {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Dynamic Island stage (inside phone) ───── */
    .di-stage {
      position: absolute;
      top: 25.5px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      z-index: 5;
      overflow: visible;
    }

    /* ── Island container ───────────────────────── */
    /* overflow: visible so SVG & lonely item can escape */
    .di-wrap {
      position: relative;
      width: var(--di-w);
      height: var(--di-h);
      will-change: width, height;
    }

    /* ── Main pill (darkroom) ───────────────────── */
    .darkroom {
      position: absolute;
      top: 0; left: 0;
      width: var(--di-w);
      height: var(--di-h);
      border-radius: 9999px;
      background: #000000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      will-change: width, height, transform, border-radius;
    }

    /* ── Expanded content (phone call) ─────────── */
    .expanded-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      filter: blur(5px);
      transform: scale(0.9);
      pointer-events: none;
      will-change: opacity, filter, transform;
    }

    .exp-left  { flex: 1; padding-left: 16px; display: flex; align-items: center; }
    .exp-right { flex: 1; padding-right: 14px; display: flex; align-items: center; justify-content: flex-end; }

    .caller { display: flex; align-items: center; gap: 8px; }

    .caller-photo {
      min-width: 34px; min-height: 34px;
      max-width: 34px; max-height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white;
      overflow: hidden; flex-shrink: 0;
    }

    .caller-info {
      display: flex; flex-direction: column;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .caller-info .device { color: #6c6c6c; font-size: 10px; }
    .caller-info .name   { color: #fff; font-size: 12px; margin-top: 3px; }

    .phone-booth { display: flex; align-items: center; gap: 8px; }

    .phone-btn {
      width: 31px; height: 31px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0;
    }
    .phone-btn.refuse  { background: #f33939; }
    .phone-btn.receive { background: #63e159; }

    /* ── Compact mode content (both-sides, no bubble) */
    .compact-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 11px 0 6px;
      opacity: 0;
      filter: blur(5px);
      transform: scale(0.9);
      pointer-events: none;
      will-change: opacity, filter, transform;
    }

    .compact-left {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      margin-left: -2px;
    }

    .compact-line {
      font-size: 10px;
      font-weight: 800;
      color: #661a99;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .compact-time {
      font-size: 10px;
      font-weight: 800;
      color: #f97316;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, 'SF Mono', monospace;
      text-align: right;
      min-width: 44px;
      white-space: nowrap;
      margin-right: 3px;
    }

    /* ── Minimized left item (split mode) ───────── */
    .minimized-left {
      position: absolute;
      top: 50%; left: 8px;
      transform: translateY(-50%) scaleX(0.5);
      display: flex; align-items: center;
      opacity: 0;
      filter: blur(4px);
      pointer-events: none;
      will-change: opacity, filter, transform;
    }

    .lyft-mark {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #f0257f;
      flex-shrink: 0;
    }

    /* ── SVG meta-animation (goo / split effect) ─ */
    /* Positioned to the right of .di-wrap (right: -46px) */
    .meta-svg {
      position: absolute;
      right: -46px;
      top: 50%;
      transform: translateY(-50%);
      z-index: -1;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Lonely island item (right bubble content) */
    .lonely-item {
      position: absolute;
      top: 0; right: -31px;
      width: 28px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 11px; font-weight: 600;
      letter-spacing: -0.01em;
      opacity: 0;
      filter: blur(4px);
      transform: translateX(-100px) scaleX(0.5);
      pointer-events: none;
      will-change: opacity, filter, transform;
    }

    /* ── Live Activity content ──────────────────── */
    .la-content {
      position: absolute;
      inset: 0;
      opacity: 0;
      filter: blur(5px);
      transform: scale(0.9);
      pointer-events: none;
      will-change: opacity, filter, transform;
      overflow: hidden;
    }

    /* Panels crossfade inside la-content */
    .la-panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 14px 12px 12px 12px;
      gap: 10px;
      opacity: 0;
      transition: opacity 250ms ease;
      pointer-events: none;
    }
    .la-panel.active { opacity: 1; pointer-events: auto; }

    /* Header row */
    .la-header { display: flex; align-items: center; justify-content: space-between; }

    .la-badge {
      display: flex; align-items: center; gap: 2px;
      background: #7c3aed;
      border-radius: 5px;
      padding: 2px 5px;
      font-size: 9px; font-weight: 800; color: white;
      letter-spacing: -0.01em;
      margin-left: 20px;
    }
    .la-chip {
      display: flex; align-items: center; gap: 3px;
      border-radius: 9999px;
      padding: 3px 8px;
      font-size: 11px; font-weight: 800; color: white;
      letter-spacing: -0.01em;
      margin-right: 8px;
    }
    .la-chip-delay     { background: #f97316; }
    .la-chip-ontime    { background: #22c55e; font-size: 9px; padding: 2px 6px; }
    .la-chip-unterwegs { background: #3b82f6; }
    #laPanel-during .la-chip { margin-top: 5px; font-size: 9px; padding: 2px 6px; margin-right: 0px; }

    /* Main: before departure */
    .la-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; flex: 1; margin-top: 6px; padding-top: 12px; }
    .la-dep-col { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .la-dep-row { display: flex; align-items: center; gap: 4px; }
    .la-dep-time  { font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .la-dep-delay { font-size: 10px; font-weight: 800; color: #f97316; }
    .la-from      { font-size: 10px; font-weight: 500; color: #888; }
    .la-cd-col    { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
    .la-cd-label  { font-size: 7px; font-weight: 700; color: #666; letter-spacing: 0.04em; }
    .la-cd-value  { font-size: 22px; font-weight: 800; color: #f97316; letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }

    /* Footer */
    .la-footer  { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px;}
    .la-to-row  { display: flex; align-items: center; gap: 3px; flex: 1; min-width: 0; }
    .la-to      { font-size: 10px; font-weight: 600; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .la-arr     { font-size: 9px; font-weight: 500; color: rgba(136,136,136,0.7); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* During journey */
    .la-during-row  { display: flex; align-items: flex-start; justify-content: space-between; flex: 1; margin-top: 9px; }
    .la-stat-left   { display: flex; flex-direction: column; gap: 1px; flex: 1; }
    .la-stat-right  { display: flex; flex-direction: column; gap: 1px; flex: 1; align-items: flex-end; }
    .la-stat-center { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 58px; }
    .la-stat-time-row    { display: flex; align-items: center; gap: 3px; }
    .la-stat-time-row--r { flex-direction: row-reverse; }
    .la-stat-time    { font-size: 12px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
    .la-stat-delay   { font-size: 9px; font-weight: 800; color: #f97316; }
    .la-stat-station   { font-size: 9px; font-weight: 500; color: #888; }
    .la-stat-station--r{ text-align: right; }
    .la-noch     { font-size: 7px; font-weight: 700; color: #666; }
    .la-noch-val { font-size: 15px; font-weight: 800; color: #f97316; letter-spacing: -0.03em; line-height: 1.1; font-variant-numeric: tabular-nums; }

    /* Progress bar */
    .la-progress-track {
      position: relative; height: 22px;
      display: flex; align-items: center; flex-shrink: 0; margin-bottom: 10px;
    }
    .la-progress-track::before {
      content: ''; position: absolute; inset: 50% 0; margin-top: -3px;
      height: 6px; background: rgba(255,255,255,0.1); border-radius: 9999px;
    }
    .la-progress-fill {
      position: absolute; left: 0; top: 50%; height: 6px; margin-top: -3px;
      background: linear-gradient(to right, rgba(249,115,22,0.5), #f97316);
      border-radius: 9999px; width: 0%; transition: none;
    }
    .la-progress-dot {
      position: absolute; left: calc(0% - 11px); top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; background: #f97316; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 8px rgba(249,115,22,0.5); transition: none;
    }

    /* Arrived */
    .la-arrived-row { display: flex; align-items: center; gap: 10px; padding: 28px 0 4px 0; }
    .la-arrived-info { display: flex; flex-direction: column; gap: 2px; }
    .la-arrived-title   { font-size: 13px; font-weight: 800; color: #fff; }
    .la-arrived-station { font-size: 10px; font-weight: 500; color: #888; }
    .la-end-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      background: rgba(239,68,68,0.75); border: none; border-radius: 10px;
      color: white; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; padding: 9px 12px; width: 100%;
      margin-bottom: 12px;
    }

    /* State label */
    .state-label {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
      letter-spacing: -0.01em; min-height: 16px; text-align: center;
      transition: opacity 200ms ease;
    }

    /* Auto button */
    .ctrl-btn-auto { background: #1a3a1a; color: #4ade80; }
    .ctrl-btn-auto:hover { background: #1f4a1f; color: #86efac; }
    .ctrl-btn-auto.playing { background: #3a1a1a !important; color: #f87171 !important; }

    /* ── Controls ───────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 600px;
    }

    .ctrl-btn {
      padding: 8px 18px;
      border-radius: 9999px;
      background: #2a2a2a;
      color: rgba(255,255,255,.75);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      letter-spacing: -0.01em;
      transition: background .15s, color .15s;
    }
    .ctrl-btn:hover { background: #333; color: #fff; }
    .ctrl-btn.active { background: #444; color: #fff; }

    /* ── Status bar time ────────────────────────── */
    .status-time {
      position: absolute;
      top: 26.75px;
      left: 48px;
      height: 24px;
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      z-index: 3;
      pointer-events: none;
      transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity  300ms ease;
    }

    /* ── Status bar icons (right) ───────────────── */
    .status-icons {
      position: absolute;
      top: 26.75px;
      right: 35px;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 3;
      pointer-events: none;
      transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity  300ms ease;
    }

    /* ── GitHub link ────────────────────────────── */
    .github-link {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,.45);
      text-decoration: none;
      white-space: nowrap;
      transition: color .15s;
    }
    .github-link:hover { color: rgba(255,255,255,.8); }
  </style>
</head>
<body>

<div class="page">

  <!-- ── Phone + Dynamic Island ──────────────── -->
  <div class="phone-container">
  <div class="screen-bg"></div>
  <div class="di-stage">
  <div class="di-wrap" id="diWrap">

    <!-- Main pill -->
    <div class="darkroom" id="darkroom">

      <!-- Expanded mode: phone call -->
      <div class="expanded-content" id="expandedContent">
        <div class="exp-left">
          <div class="caller">
            <div class="caller-photo">JH</div>
            <div class="caller-info">
              <span class="device">iPhone</span>
              <span class="name">Jang Haemin</span>
            </div>
          </div>
        </div>
        <div class="exp-right">
          <div class="phone-booth">
            <button class="phone-btn refuse" aria-label="Refuse">
              <!-- phone down / hangup -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M6.6 10.8c1.4 3.1 3.8 5.5 6.9 6.9l2.3-2.3c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C9.4 21 3 14.6 3 6.6c0-.56.45-1 1-1H8c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02L6.6 10.8z"
                      transform="rotate(135 12 12)"/>
              </svg>
            </button>
            <button class="phone-btn receive" aria-label="Receive">
              <!-- phone up / answer -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                <path d="M6.6 10.8c1.4 3.1 3.8 5.5 6.9 6.9l2.3-2.3c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.58.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C9.4 21 3 14.6 3 6.6c0-.56.45-1 1-1H8c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02L6.6 10.8z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Compact mode: transit line + time -->
      <div class="compact-content" id="compactContent">
        <div class="compact-left">
          <!-- tram.fill equivalent (Material tram icon) -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="#661a99" aria-hidden="true">
            <path d="M19 16H5v1.5c0 .8.7 1.5 1.5 1.5h11c.8 0 1.5-.7 1.5-1.5V16zm0-9H5v7h14V7zM12 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm8-1H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2l-2 2v1h20v-1l-2-2c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 15H4V5h16v13z"/>
          </svg>
          <span class="compact-line">RE10</span>
        </div>
        <span class="compact-time">6:11</span>
      </div>

      <!-- Minimized left (split mode) -->
      <div class="minimized-left" id="minimizedLeft">
        <div class="lyft-mark"></div>
      </div>

      <!-- Live Activity -->
      <div class="la-content" id="laContent">

        <!-- Panel 1+2: Vor Abfahrt (ontime / delayed) -->
        <div class="la-panel active" id="laPanel-before" style="gap: 2px">
          <div class="la-header">
            <div class="la-badge">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M4 17h2v-7H4v7zm14-9h-4V6l-2-2h-4L6 6v2H2v2h1v9h14v-9h1V8h-1zm-6 9h-4v-4h4v4zm2-9H8V6.83L9.83 5h4.34L16 6.83V8z"/></svg>
              <span>RE 1</span>
            </div>
            <div class="la-chip la-chip-delay" id="laChipDelay">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
              <span id="laChipDelayText">+16'</span>
            </div>
            <div class="la-chip la-chip-ontime" id="laChipOntime" style="display:none;">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" style="display:none"/><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
              <span>Pünktlich</span>
            </div>
          </div>
          <div class="la-main">
            <div class="la-dep-col">
              <div class="la-dep-row">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="#f97316"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                <span class="la-dep-time" id="laDepTime">20:47</span>
                <span class="la-dep-delay" id="laDepDelay">+16'</span>
              </div>
              <span class="la-from">Mannheim, Hauptbahnhof</span>
            </div>
            <div class="la-cd-col">
              <span class="la-cd-label" id="laCdLabel">ABFAHRT IN</span>
              <span class="la-cd-value" id="laCdValue">6:04</span>
            </div>
          </div>
          <div class="la-footer">
            <div class="la-to-row">
              <svg width="8" height="8" viewBox="0 0 24 24" fill="#888"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
              <span class="la-to">Heidelberg, Hauptbahnhof</span>
            </div>
            <span class="la-arr">Ank. 21:05</span>
          </div>
        </div>

        <!-- Panel 3: Während Fahrt -->
        <div class="la-panel" id="laPanel-during">
          <div class="la-header">
            <div class="la-badge">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M4 17h2v-7H4v7zm14-9h-4V6l-2-2h-4L6 6v2H2v2h1v9h14v-9h1V8h-1zm-6 9h-4v-4h4v4zm2-9H8V6.83L9.83 5h4.34L16 6.83V8z"/></svg>
              <span>RE 1</span>
            </div>
            <div class="la-chip la-chip-unterwegs" id="laChipUnterwegs">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
              <span id="laChipUnterwegsText">Unterwegs</span>
            </div>
          </div>
          <div class="la-during-row">
            <div class="la-stat-left">
              <div class="la-stat-time-row">
                <span class="la-stat-time">20:47</span>
                <span class="la-stat-delay" id="laDuringDelay">+5'</span>
              </div>
              <span class="la-stat-station">Mannheim Hbf</span>
            </div>
            <div class="la-stat-center">
              <span class="la-noch">noch</span>
              <span class="la-noch-val" id="laNochVal">14:22</span>
            </div>
            <div class="la-stat-right">
              <div class="la-stat-time-row la-stat-time-row--r">

    </div><!-- /.darkroom -->

    <!-- SVG: goo / split-separation effect  ─────
         The filter threshold trick: Gaussian blur +

         that overlap merge, and separate when apart. -->

          <feColorMatrix in="blur"
                         mode="matrix"

</div><!-- /.page -->
<script>
/* ── Status bar clock ─────────────────────────── */
const statusTime = document.getElementById('statusTime');
function updateClock() {
  const now = new Date();
  statusTime.textContent =
    now.getHours().toString().padStart(2, '0') + ':' +
    now.getMinutes().toString().padStart(2, '0');
  const msToNext = 60000 - (now.getSeconds() * 1000 + now.getMilliseconds());
  setTimeout(updateClock, msToNext);
}
updateClock();

/* ── State ────────────────────────────────────── */
let currentMode = 'default';

const diWrap         = document.getElementById('diWrap');
const darkroom       = document.getElementById('darkroom');
const expandedContent= document.getElementById('expandedContent');
const minimizedLeft  = document.getElementById('minimizedLeft');
const lonelyItem     = document.getElementById('lonelyItem');
const lonelyRect     = document.getElementById('lonelyRect');
const gaussBlur      = document.getElementById('gaussBlur');
const compactContent = document.getElementById('compactContent');
const statusIcons    = document.querySelector('.status-icons');
const statusWifi     = document.getElementById('statusWifi');
const statusBattery  = document.getElementById('statusBattery');

const rootStyle = getComputedStyle(document.documentElement);
const DI_W = rootStyle.getPropertyValue('--di-w').trim();
const DI_H = rootStyle.getPropertyValue('--di-h').trim();
const laContent = document.getElementById('laContent');

/* ── Helpers ──────────────────────────────────── */

/* Easing functions matching react-spring configs */
/* flatMove (tension:300, mass:0.1) → very fast, ~180ms */
const FLAT_DUR    = 320;
const FLAT_EASE   = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';

/* Large/Call spring (tension:250, mass:1.5) → ~480ms with slight overshoot */
const LARGE_DUR   = 680;
const LARGE_EASE  = 'cubic-bezier(0.34, 1.56, 0.64, 1)';

/* Split spring (tension:250, mass:2) → ~560ms with more overshoot */
const SPLIT_DUR   = 560;
const SPLIT_EASE  = 'cubic-bezier(0.34, 1.80, 0.64, 1)';

/* Smoothly animate a numeric value via rAF */
function animateValue(from, to, duration, easing, delay, onUpdate) {
  const start = performance.now() + (delay || 0);
  function step(now) {
    if (now < start) { requestAnimationFrame(step); return; }
    const t = Math.min((now - start) / duration, 1);
    const e = easing(t);
    onUpdate(from + (to - from) * e);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t)   { return 1 - Math.pow(1-t, 3); }
function linear(t)    { return t; }

/* Apply CSS transition shorthand and values */
function setTransition(el, props) {
  el.style.transition = props;
}
function clearTransition(el) {
  el.style.transition = 'none';
}

/* Animate SVG stdDeviation (CSS can't do this) */
let currentBlur = 10;
function animateBlur(toValue, duration, easing, delay) {
  const from = currentBlur;
  animateValue(from, toValue, duration, easing, delay, v => {
    currentBlur = v;
    gaussBlur.setAttribute('stdDeviation', v);
  });
}

/* Animate SVG rect X translation (SVG transform attribute) */
let currentRectTx = 0;
function animateRectTx(toValue, duration, easing, delay) {
  const from = currentRectTx;
  animateValue(from, toValue, duration, easing, delay, v => {
    currentRectTx = v;
    lonelyRect.setAttribute('transform', `translate(${v}, 0)`);
  });
}

/* ── Mode application ─────────────────────────── */

function setMode(newMode) {
  if (newMode === currentMode) return;
  const prev = currentMode;
  currentMode = newMode;

  const t = `${prev}→${newMode}`;

  if (newMode === 'default') applyDefault(t);
  else if (newMode === 'large') applyLarge(t);
  else if (newMode === 'xlarge') applyXlarge(t);
  else if (newMode === 'split') applySplit(t);
  else if (newMode === 'compact') applyCompact(t);
}

/* ── Default ───── */
function applyDefault(t) {
  const delay = t.startsWith('split') ? 0 : 100;

  /* Shrink outer wrapper width only — height stays fixed so top edge is stable */
  setTransition(diWrap, `width ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms`);
  diWrap.style.width  = DI_W;

  setTransition(darkroom,
    `width ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     height ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     transform ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     border-top-left-radius ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     border-top-right-radius ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     border-bottom-left-radius ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     border-bottom-right-radius ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms`);
  darkroom.style.width              = DI_W;
  darkroom.style.height             = DI_H;
  darkroom.style.transform          = 'translateX(0)';
  darkroom.style.background         = '#000000';
  darkroom.style.borderTopLeftRadius    = '9999px';
  darkroom.style.borderTopRightRadius   = '9999px';
  darkroom.style.borderBottomLeftRadius = '9999px';
  darkroom.style.borderBottomRightRadius= '9999px';

  /* Expanded content: quick fade out */
  setTransition(expandedContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  expandedContent.style.opacity   = '0';
  expandedContent.style.filter    = 'blur(5px)';
  expandedContent.style.transform = 'scale(0.9)';
  expandedContent.style.pointerEvents = 'none';

  /* Live Activity content: fade out */
  setTransition(laContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  laContent.style.opacity   = '0';
  laContent.style.filter    = 'blur(5px)';
  laContent.style.transform = 'scale(0.9)';
  laContent.style.pointerEvents = 'none';

  /* Minimized left: fade out */
  setTransition(minimizedLeft, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  minimizedLeft.style.opacity   = '0';
  minimizedLeft.style.filter    = 'blur(4px)';
  minimizedLeft.style.transform = 'translateY(-50%) scaleX(0.5)';

  /* Lonely item: fly back */
  setTransition(lonelyItem, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  lonelyItem.style.opacity   = '0';
  lonelyItem.style.filter    = 'blur(4px)';
  lonelyItem.style.transform = 'translateX(-100px) scaleX(0.5)';
  lonelyItem.style.pointerEvents = 'none';

  /* Compact content: fade out */
  setTransition(compactContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  compactContent.style.opacity   = '0';
  compactContent.style.filter    = 'blur(5px)';
  compactContent.style.transform = 'scale(0.9)';
  compactContent.style.pointerEvents = 'none';

  /* Status time: slide back in */
  statusTime.style.transform = 'translateX(0)';
  statusTime.style.opacity   = '1';

  /* Status icons: slide back in */
  statusIcons.style.transform   = 'translateX(0)';
  statusIcons.style.opacity     = '1';
  statusWifi.style.opacity      = '0.45';
  statusWifi.style.transform    = '';
  statusBattery.style.transform = 'translateX(0)';

  /* SVG: blur the goo back → shapes merge/disappear */
  if (t.startsWith('split')) {
    animateBlur(10, 100, easeOut, 0);
    animateRectTx(0, FLAT_DUR, easeOut, 0);
  }
}

/* ── Large (Phone Call) ───── */
function applyLarge(t) {
  const delay      = t.startsWith('split') ? 50 : 0;
  const expDelay   = 100 + (t.startsWith('split') ? 50 : 0);

  /* Grow wrapper width only — top edge stays fixed, height grows downward */
  setTransition(diWrap, `width ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms`);
  diWrap.style.width  = '260px';

  /* Pill expands: width centered (via wrapper), height downward from top:0 */
  setTransition(darkroom,
    `width ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms,
     height ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms,
     transform ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms,
     border-top-left-radius ${LARGE_DUR}ms ease-out ${delay}ms,
     border-top-right-radius ${LARGE_DUR}ms ease-out ${delay}ms,
     border-bottom-left-radius ${LARGE_DUR}ms ease-out ${delay}ms,
     border-bottom-right-radius ${LARGE_DUR}ms ease-out ${delay}ms`);
  darkroom.style.width              = '260px';
  darkroom.style.height             = '62px';
  darkroom.style.transform              = 'translateX(0)';
  darkroom.style.borderTopLeftRadius    = '40px';
  darkroom.style.borderTopRightRadius   = '40px';
  darkroom.style.borderBottomLeftRadius = '40px';
  darkroom.style.borderBottomRightRadius= '40px';

  /* Expanded content: fade in after delay */
  setTimeout(() => {
    setTransition(expandedContent, `opacity 200ms ease, filter 200ms ease, transform 200ms ease`);
    expandedContent.style.opacity   = '1';
    expandedContent.style.filter    = 'blur(0)';
    expandedContent.style.transform = 'scale(1)';
    expandedContent.style.pointerEvents = 'auto';
  }, expDelay);

  /* Minimized + lonely: hide */
  setTransition(minimizedLeft, `opacity 150ms ease`);
  minimizedLeft.style.opacity = '0';

  setTransition(lonelyItem, `opacity 150ms ease`);
  lonelyItem.style.opacity = '0';
  lonelyItem.style.pointerEvents = 'none';

  /* Compact content: hide */
  setTransition(compactContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  compactContent.style.opacity   = '0';
  compactContent.style.filter    = 'blur(5px)';
  compactContent.style.transform = 'scale(0.9)';
  compactContent.style.pointerEvents = 'none';

  /* Live Activity: hide */
  setTransition(laContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  laContent.style.opacity   = '0';
  laContent.style.filter    = 'blur(5px)';
  laContent.style.transform = 'scale(0.9)';
  laContent.style.pointerEvents = 'none';

  /* SVG: blur the goo if coming from split */
  if (t.startsWith('split')) {
    animateBlur(10, 100, easeOut, 0);
    animateRectTx(0, FLAT_DUR, easeOut, 0);
  }
}

/* ── Live Activity (XLarge) ───── */
function applyXlarge(t) {
  const delay    = t.startsWith('split') ? 50 : 0;
  const expDelay = 100 + (t.startsWith('split') ? 50 : 0);
  const fromDefault = t.startsWith('default') || t.startsWith('compact');

  setTransition(diWrap, `width ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms`);
  diWrap.style.width = '263px';

  /* When coming from default or compact, snap border-radius immediately so it doesn't
     animate through the "very rounded" intermediate state */
  if (fromDefault) {
    darkroom.style.transition = 'none';
    darkroom.style.borderTopLeftRadius     = '41px';
    darkroom.style.borderTopRightRadius    = '41px';
    darkroom.style.borderBottomLeftRadius  = '41px';
    darkroom.style.borderBottomRightRadius = '41px';
    darkroom.getBoundingClientRect(); // force reflow
  }

  setTransition(darkroom,
    `width ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms,
     height ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms,
     transform ${LARGE_DUR}ms ${LARGE_EASE} ${delay}ms` +
    (fromDefault ? '' : `,
     border-top-left-radius ${LARGE_DUR}ms ease-out ${delay}ms,
     border-top-right-radius ${LARGE_DUR}ms ease-out ${delay}ms,
     border-bottom-left-radius ${LARGE_DUR}ms ease-out ${delay}ms,
     border-bottom-right-radius ${LARGE_DUR}ms ease-out ${delay}ms`));
  darkroom.style.width               = '263px';
  darkroom.style.height              = '140px';
  darkroom.style.transform           = 'translateX(0)';
  darkroom.style.borderTopLeftRadius     = '41px';
  darkroom.style.borderTopRightRadius    = '41px';
  darkroom.style.borderBottomLeftRadius  = '41px';
  darkroom.style.borderBottomRightRadius = '41px';

  setTimeout(() => {
    setTransition(expandedContent, `opacity 200ms ease, filter 200ms ease, transform 200ms ease`);
    expandedContent.style.opacity    = '0';
    expandedContent.style.filter     = 'blur(5px)';
    expandedContent.style.transform  = 'scale(0.9)';
    expandedContent.style.pointerEvents = 'none';

    setTransition(laContent, `opacity 200ms ease, filter 200ms ease, transform 200ms ease`);
    laContent.style.opacity    = '1';
    laContent.style.filter     = 'blur(0)';
    laContent.style.transform  = 'scale(1)';
    laContent.style.pointerEvents = 'auto';
  }, expDelay);

  setTransition(minimizedLeft, `opacity 150ms ease`);
  minimizedLeft.style.opacity = '0';
  setTransition(lonelyItem, `opacity 150ms ease`);
  lonelyItem.style.opacity = '0';
  lonelyItem.style.pointerEvents = 'none';

  /* Compact content: hide */
  setTransition(compactContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  compactContent.style.opacity   = '0';
  compactContent.style.filter    = 'blur(5px)';
  compactContent.style.transform = 'scale(0.9)';
  compactContent.style.pointerEvents = 'none';

  /* Status time: slide out to the left */
  statusTime.style.transform = 'translateX(-80px)';
  statusTime.style.opacity   = '0';

  /* Status icons: slide out to the right */
  statusIcons.style.transform = 'translateX(80px)';
  statusIcons.style.opacity   = '0';

  if (t.startsWith('split')) {
    animateBlur(10, 100, easeOut, 0);
    animateRectTx(0, FLAT_DUR, easeOut, 0);
  }
}

/* ── Split ───── */
function applySplit(t) {
  const darkDelay = t.startsWith('large') ? 100 : 0;
  const rectDelay = t.startsWith('large') ? 200 : 0;

  /* Pill shifts left and widens */
  setTransition(darkroom,
    `width ${SPLIT_DUR}ms ${SPLIT_EASE} ${darkDelay}ms,
     height ${FLAT_DUR}ms ${FLAT_EASE} ${darkDelay}ms,
     transform ${SPLIT_DUR}ms ${SPLIT_EASE} ${darkDelay}ms,
     border-radius 200ms ease ${darkDelay}ms`);
  darkroom.style.width        = '118px';  /* 88 + 30 */
  darkroom.style.height       = DI_H;
  darkroom.style.transform    = 'translateX(-30px)';
  darkroom.style.borderRadius = '9999px';

  /* Expanded content: hide */
  setTransition(expandedContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  expandedContent.style.opacity   = '0';
  expandedContent.style.filter    = 'blur(5px)';
  expandedContent.style.transform = 'scale(0.9)';
  expandedContent.style.pointerEvents = 'none';

  /* Compact content: hide */
  setTransition(compactContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  compactContent.style.opacity   = '0';
  compactContent.style.filter    = 'blur(5px)';
  compactContent.style.transform = 'scale(0.9)';
  compactContent.style.pointerEvents = 'none';

  /* SVG rect: fly right → creates the right bubble */
  animateRectTx(41, SPLIT_DUR, easeOut, rectDelay);

  /* Goo blur: 10 → 0 (shapes sharpen = separate) */
  animateBlur(0, 400, linear, 250);

  /* Minimized left item: appear */
  setTimeout(() => {
    setTransition(minimizedLeft,
      `opacity 200ms ease, filter 200ms ease, transform 200ms ease`);
    minimizedLeft.style.opacity   = '1';
    minimizedLeft.style.filter    = 'blur(0)';
    minimizedLeft.style.transform = 'translateY(-50%) scaleX(1)';
  }, 100);

  /* Lonely item: fly in from the right bubble */
  setTimeout(() => {
    setTransition(lonelyItem,
      `opacity 200ms ease, filter 200ms ease, transform 200ms ease`);
    lonelyItem.style.opacity   = '1';
    lonelyItem.style.filter    = 'blur(0)';
    lonelyItem.style.transform = 'translateX(0) scaleX(1)';
    lonelyItem.style.pointerEvents = 'auto';
  }, 100);
}

/* ── Auto-play ────────────────────────────────── */

const stateLabel   = document.getElementById('stateLabel');
const laChipDelay  = document.getElementById('laChipDelay');
const laChipOntime = document.getElementById('laChipOntime');
const laDepDelay   = document.getElementById('laDepDelay');
const laCdValue    = document.getElementById('laCdValue');
const btnAuto      = document.getElementById('btnAuto');

function setLaPanel(panelId, chip) {
  document.querySelectorAll('.la-panel').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('laPanel-' + panelId);
  if (el) el.classList.add('active');
  if (panelId === 'during') {
    startProgressAnim(chip === 'ontime');
  } else if (panelId === 'before') {
    startBeforeAnim(chip === 'ontime');
    darkroom.style.background = '#000000';
  } else {
    darkroom.style.background = '#000000';
  }
}

let beforeRaf = null;
function startBeforeAnim(isOntime) {
  if (beforeRaf) cancelAnimationFrame(beforeRaf);
  const cdEl     = document.getElementById('laCdValue');
  if (!cdEl) return;
  const totalSec = 6 * 60 + 4; // 6:04
  const dur      = 2800;
  const start    = performance.now();
  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }
  cdEl.textContent = fmt(totalSec);
  function tick(now) {
    const t      = Math.min((now - start) / dur, 1);
    const remSec = Math.round((1 - t) * totalSec);
    cdEl.textContent = fmt(remSec);
    if (t < 1) beforeRaf = requestAnimationFrame(tick);
  }
  beforeRaf = requestAnimationFrame(tick);
}

let progressRaf = null;
function startProgressAnim(isOntime) {
  if (progressRaf) cancelAnimationFrame(progressRaf);
  const fill     = document.getElementById('laProgressFill');
  const dot      = document.getElementById('laProgressDot');
  const nochVal  = document.getElementById('laNochVal');
  const color    = isOntime ? '#22c55e' : '#f97316';
  const colorFad = isOntime ? 'rgba(34,197,94,0.5)' : 'rgba(249,115,22,0.5)';
  const dur      = 6000;
  const totalSec = 14 * 60 + 22;
  const start    = performance.now();
  if (fill) fill.style.background = `linear-gradient(to right, ${colorFad}, ${color})`;
  if (dot)  { dot.style.background = color; dot.style.boxShadow = `0 0 8px ${colorFad}`; }
  darkroom.style.background = '#000000';
  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }
  function tick(now) {
    const t      = Math.min((now - start) / dur, 1);
    const pct    = easeInOut(t) * 100;
    const remSec = Math.round((1 - t) * totalSec);
    fill.style.width = pct + '%';
    dot.style.left   = 'calc(' + pct + '% - 11px)';
    if (nochVal) nochVal.textContent = fmt(remSec);
    if (t < 1) progressRaf = requestAnimationFrame(tick);
  }
  fill.style.width = '0%';
  dot.style.left   = 'calc(0% - 11px)';
  if (nochVal) nochVal.textContent = fmt(totalSec);
  progressRaf = requestAnimationFrame(tick);
}

// ── Auto-play steps — edit dur (ms) and label here ──────────
const S_DEFAULT       = { mode: 'default',                                  label: 'Default',                    btn: 'Default',     dur: 1200 };
const S_DEFAULT_SHORT = { mode: 'default',                                  label: 'Default',                    btn: 'Default',     dur: 700  };
const S_PHONE_CALL    = { mode: 'large',                                    label: 'Phone Call',                 btn: 'Phone Call',  dur: 2500 };
const S_SPLIT         = { mode: 'split',                                    label: 'Split',                      btn: 'Split',       dur: 2000 };
const S_LA_DELAYED    = { mode: 'xlarge', panel: 'before', chip: 'delay',  label: 'Live Activity · Verspätet',  btn: 'Verspätet',   dur: 2800 };
const S_LA_ONTIME     = { mode: 'xlarge', panel: 'before', chip: 'ontime', label: 'Live Activity · Pünktlich',  btn: 'Pünktlich',   dur: 2800 };
const S_LA_DURING     = { mode: 'xlarge', panel: 'during', chip: 'delay',  label: 'Live Activity · Unterwegs',  btn: 'Unterwegs',   dur: 2800 };
const S_LA_DURING_OT  = { mode: 'xlarge', panel: 'during', chip: 'ontime', label: 'Live Activity · Unterwegs',  btn: 'Unterwegs',   dur: 2800 };
const S_LA_ARRIVED    = { mode: 'xlarge', panel: 'arrived',                label: 'Live Activity · Angekommen', btn: 'Angekommen',  dur: 2800 };
const S_COMPACT       = { mode: 'compact',                                 label: 'Compact',                    btn: 'Compact',     dur: 2000 };

// ── Individual step buttons (all unique states) ───────────────
const STEPS_LIST = [S_DEFAULT, S_PHONE_CALL, S_LA_DELAYED, S_LA_ONTIME, S_SPLIT, S_COMPACT, S_LA_DURING, S_LA_ARRIVED];

const controls = document.getElementById('controls');
STEPS_LIST.forEach((step, i) => {
  const btn = document.createElement('button');
  btn.className = 'ctrl-btn' + (i === 0 ? ' active' : '');
  btn.dataset.step = i;
  btn.textContent = step.btn;
  btn.onclick = () => { stopAuto(); applyAutoStep(step); setActiveStepBtn(step); };
  controls.insertBefore(btn, btnAuto);
});

function setActiveStepBtn(step) {
  document.querySelectorAll('.ctrl-btn[data-step]').forEach(b => b.classList.remove('active'));
  const idx = STEPS_LIST.findIndex(s => s.mode === step.mode && s.panel === step.panel && s.chip === step.chip);
  const el = document.querySelector(`.ctrl-btn[data-step="${idx}"]`);
  if (el) el.classList.add('active');
}

let autoTimer = null;
let autoIndex = 0;
let isPlaying = false;

function stopAuto() {
  if (!isPlaying) return;
  isPlaying = false;
  clearTimeout(autoTimer);
  btnAuto.classList.remove('playing');
  btnAuto.textContent = '▶ Auto';
  stateLabel.textContent = '';
}

function toggleAutoPlay() {
  if (isPlaying) {
    stopAuto();
  } else {
    isPlaying = true;
    autoIndex = 0;
    btnAuto.classList.add('playing');
    btnAuto.textContent = '■ Stop';
    runAutoStep();
  }
}

function applyAutoStep(step) {
  stateLabel.textContent = step.label;
  setActiveStepBtn(step);

  if (step.mode === 'xlarge') {
    if (step.panel === 'before' && step.chip) {
      laChipDelay.style.display  = step.chip === 'delay'  ? '' : 'none';
      laChipOntime.style.display = step.chip === 'ontime' ? '' : 'none';
      laDepDelay.style.display   = step.chip === 'delay'  ? '' : 'none';
      laCdValue.style.color      = step.chip === 'ontime' ? '#22c55e' : '#f97316';
    }
    if (step.panel === 'during') {
      const delayL = document.getElementById('laDuringDelay');
      const delayR = document.getElementById('laDuringDelayR');
      const chipUW = document.getElementById('laChipUnterwegs');
      const chipTx = document.getElementById('laChipUnterwegsText');
      const isOT   = step.chip === 'ontime';
      if (delayL) delayL.style.display = isOT ? 'none' : '';
      if (delayR) delayR.style.display = isOT ? 'none' : '';
      if (chipUW) chipUW.style.background = isOT ? '#22c55e' : '#3b82f6';
      if (chipTx) chipTx.textContent = isOT ? 'Pünktlich' : 'Unterwegs';
    }

    if (currentMode === 'xlarge') {
      setLaPanel(step.panel, step.chip);
    } else {
      setLaPanel(step.panel, step.chip);
      setMode('xlarge');
    }
  } else {
    setMode(step.mode);
  }
}

function pressBeendenButton(callback) {
  const btn = document.querySelector('.la-end-btn');
  if (!btn) { callback(); return; }
  btn.style.transition = 'transform 120ms ease, opacity 120ms ease';
  btn.style.transform  = 'scale(0.91)';
  btn.style.opacity    = '0.6';
  setTimeout(() => {
    btn.style.transform = 'scale(1)';
    btn.style.opacity   = '1';
    setTimeout(callback, 350);
  }, 220);
}

function runAutoSequence() {
  if (!isPlaying) return;
  const isDelayed  = Math.random() < 0.5;
  const beforeStep = isDelayed ? S_LA_DELAYED : S_LA_ONTIME;
  const duringStep = isDelayed ? S_LA_DURING  : S_LA_DURING_OT;

  const sequence = [
    { step: S_DEFAULT,      dur: 1200 },
    { step: S_COMPACT,      dur: 2000 },
    { step: beforeStep,     dur: 5000 },
    { step: duringStep,     dur: 8000 },
    { step: S_LA_ARRIVED,   dur: 4000 },
  ];

  let i = 0;
  function next() {
    if (!isPlaying) return;
    if (i >= sequence.length) {
      pressBeendenButton(() => {
        if (!isPlaying) return;
        applyAutoStep(S_DEFAULT);
        autoTimer = setTimeout(() => { if (isPlaying) runAutoSequence(); }, 20000);
      });
      return;
    }
    const { step, dur } = sequence[i++];
    applyAutoStep(step);
    autoTimer = setTimeout(next, dur);
  }
  next();
}

function runAutoStep() {
  runAutoSequence();
}

/* ── Compact (both sides, no bubble) ───── */
function applyCompact(t) {
  const delay        = (t.startsWith('large') || t.startsWith('xlarge')) ? 100 : 0;
  const contentDelay = delay + 80;

  /* Pill expands symmetrically: 180px centered → 46px out on each side */
  setTransition(darkroom,
    `width ${SPLIT_DUR}ms ${SPLIT_EASE} ${delay}ms,
     height ${FLAT_DUR}ms ${FLAT_EASE} ${delay}ms,
     transform ${SPLIT_DUR}ms ${SPLIT_EASE} ${delay}ms,
     border-radius 200ms ease ${delay}ms`);
  darkroom.style.width        = '180px';
  darkroom.style.height       = DI_H;
  darkroom.style.transform    = 'translateX(-46px)';
  darkroom.style.borderRadius = '9999px';

  /* Hide all other content */
  setTransition(expandedContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  expandedContent.style.opacity   = '0';
  expandedContent.style.filter    = 'blur(5px)';
  expandedContent.style.transform = 'scale(0.9)';
  expandedContent.style.pointerEvents = 'none';

  setTransition(laContent, `opacity 150ms ease, filter 150ms ease, transform 150ms ease`);
  laContent.style.opacity   = '0';
  laContent.style.filter    = 'blur(5px)';
  laContent.style.transform = 'scale(0.9)';
  laContent.style.pointerEvents = 'none';

  setTransition(minimizedLeft, `opacity 150ms ease`);
  minimizedLeft.style.opacity = '0';

  setTransition(lonelyItem, `opacity 150ms ease`);
  lonelyItem.style.opacity = '0';
  lonelyItem.style.pointerEvents = 'none';

  /* If coming from split: merge the goo bubble back */
  if (t.startsWith('split')) {
    animateBlur(10, 100, easeOut, 0);
    animateRectTx(0, FLAT_DUR, easeOut, 0);
  }

  /* Status time: shift left as pill expands */
  statusTime.style.transform = 'translateX(-17px)';
  statusTime.style.opacity   = '1';

  /* Status icons: stay in place (battery remains visible) */
  statusIcons.style.transform = 'translateX(15px)';
  statusIcons.style.opacity   = '1';
  statusWifi.style.opacity       = '0.45';
  statusWifi.style.transform     = 'scale(0.75) translateX(-7px) translateY(0px)'; /* ← Position hier anpassen */
  statusBattery.style.transform  = 'translateX(-12px)';

  /* Compact content: fade in once pill has expanded */
  setTimeout(() => {
    setTransition(compactContent, `opacity 200ms ease, filter 200ms ease, transform 200ms ease`);
    compactContent.style.opacity   = '1';
    compactContent.style.filter    = 'blur(0)';
    compactContent.style.transform = 'scale(1)';
    compactContent.style.pointerEvents = 'auto';
  }, contentDelay);
}
</script>
